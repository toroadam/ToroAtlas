name: API Tenant Isolation CI

on:
  push:
    paths:
      - "packages/api/**"
      - ".github/workflows/api-tenant-rls.yml"
  pull_request:
    paths:
      - "packages/api/**"
      - ".github/workflows/api-tenant-rls.yml"

jobs:
  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: toroatlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d toroatlas_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://toroatlas_app:toroatlas_app_pw@127.0.0.1:5432/toroatlas_test
      POSTGRES_RLS_TEST_DATABASE_URL: postgresql://toroatlas_app:toroatlas_app_pw@127.0.0.1:5432/toroatlas_test
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/api/package-lock.json

      - name: Install API dependencies
        run: npm ci --prefix packages/api

      - name: Create non-superuser role for RLS tests
        run: |
          psql postgresql://postgres:postgres@127.0.0.1:5432/toroatlas_test <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'toroatlas_app') THEN
              CREATE ROLE toroatlas_app LOGIN PASSWORD 'toroatlas_app_pw';
            ELSE
              ALTER ROLE toroatlas_app WITH LOGIN PASSWORD 'toroatlas_app_pw';
            END IF;
          END
          $$;
          GRANT CONNECT, CREATE ON DATABASE toroatlas_test TO toroatlas_app;
          SQL

      - name: Typecheck API
        run: npm --prefix packages/api run typecheck

      - name: Run API tests (includes PostgreSQL RLS enforcement)
        run: npm --prefix packages/api test
